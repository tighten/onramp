name: Duster Lint

on:
    push:
        branches: [ main ]
    pull_request:

jobs:
  duster:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: "Configure Nova auth"
        env:
          NOVA_USERNAME: ${{ secrets.NOVA_USERNAME }}
          NOVA_PASSWORD: ${{ secrets.NOVA_PASSWORD }}
        run: composer config --global --auth http-basic.nova.laravel.com "$NOVA_USERNAME" "$NOVA_PASSWORD"

      - name: "Install Composer dependencies"
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: "Duster Lint"
        run: composer lint
